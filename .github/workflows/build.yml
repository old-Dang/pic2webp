name: Build Pic2WebP
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: Pic2WebP

jobs:
  # ── Shared setup: extract version from tag ──
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.getver.outputs.semver }}
    steps:
      - id: getver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          echo "semver=$VER" >> $GITHUB_OUTPUT
          echo "Tag: $TAG → Version: $VER"

  build-windows:
    needs: version
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4

      - name: Set version in tauri.conf.json
        run: |
          $ver = "${{ needs.version.outputs.semver }}"
          $conf = "src-tauri/tauri.conf.json"
          (Get-Content $conf) -replace '"version": ".*"', "`"version`": `"$ver`"" | Set-Content $conf
          echo "Version set to $ver"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install npm dependencies
        run: npm install
      - name: Build Tauri app (MSI)
        run: npm run tauri build -- --bundles msi
      - name: Rename MSI with tag version
        run: |
          Push-Location src-tauri/target/release/bundle/msi
          Rename-Item *.msi "${{ env.APP_NAME }}_${{ needs.version.outputs.semver }}_x64_en-US.msi"
          Pop-Location
      - name: Upload MSI to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: tauri/src-tauri/target/release/bundle/msi/*.msi
          make_latest: false

  build-macos:
    needs: version
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4

      - name: Set version in tauri.conf.json
        run: |
          VER="${{ needs.version.outputs.semver }}"
          jq ".version = \"$VER\"" src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          echo "Version set to $VER"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install cwebp
        run: brew install webp

      - name: Bundle cwebp into tools/ (for Tauri resource bundler)
        run: |
          cp "$(which cwebp)" tools/cwebp
          chmod +x tools/cwebp

      - name: Install npm dependencies
        run: npm install

      # ── ARM64-only DMG via Tauri ──
      - name: Build ARM64 DMG
        run: npm run tauri build -- --bundles dmg

      - name: Rename ARM64 DMG
        run: |
          VER="${{ needs.version.outputs.semver }}"
          arm64_dmg="src-tauri/target/release/bundle/dmg/${APP_NAME}_${VER}_arm64.dmg"
          mv src-tauri/target/release/bundle/dmg/*.dmg "$arm64_dmg"

      - name: Inject fix-gatekeeper script into ARM64 DMG
        run: |
          set -e
          VER="${{ needs.version.outputs.semver }}"
          ARM64_DMG="src-tauri/target/release/bundle/dmg/${APP_NAME}_${VER}_arm64.dmg"
          MOUNT_POINT="/tmp/pic2webp-arm64"
          RW_IMG="${ARM64_DMG}.rw.dmg"
          
          # Convert to read-write, mount, inject script, convert back
          hdiutil convert "$ARM64_DMG" -format UDRW -o "$RW_IMG"
          mkdir -p "$MOUNT_POINT"
          hdiutil attach "$RW_IMG" -mountpoint "$MOUNT_POINT" -nobrowse
          
          cp scripts/fix-gatekeeper.command "$MOUNT_POINT/"
          chmod +x "$MOUNT_POINT/fix-gatekeeper.command"
          
          hdiutil detach "$MOUNT_POINT" -force
          rm -f "$ARM64_DMG"
          hdiutil convert "$RW_IMG" -format UDZO -o "$ARM64_DMG"
          rm -f "$RW_IMG" "$MOUNT_POINT"

      # ── Universal DMG (ARM64 + x86_64) ──
      - name: Build frontend
        run: npm run build

      - name: Build Intel binary
        working-directory: tauri/src-tauri
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal .app bundle and DMG
        run: |
          set -e
          VER="${{ needs.version.outputs.semver }}"
          APP_PATH="src-tauri/target/release/bundle/macos/$APP_NAME.app"
          
          ARM64_BIN="src-tauri/target/release/pic2webp"
          X86_BIN="src-tauri/target/x86_64-apple-darwin/release/pic2webp"
          
          # lipo → universal binary
          UNIVERSAL_BIN="src-tauri/target/release/pic2webp-universal"
          lipo -create -output "$UNIVERSAL_BIN" "$ARM64_BIN" "$X86_BIN"
          
          # Create .app bundle
          mkdir -p "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Resources"
          
          cat > "$APP_PATH/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundleDisplayName</key>
              <string>$APP_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>com.danglei.pic2webp</string>
              <key>CFBundleVersion</key>
              <string>$VER</string>
              <key>CFBundleShortVersionString</key>
              <string>$VER</string>
              <key>CFBundleExecutable</key>
              <string>pic2webp</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          cp "$UNIVERSAL_BIN" "$APP_PATH/Contents/MacOS/pic2webp"
          chmod +x "$APP_PATH/Contents/MacOS/pic2webp"
          cp src-tauri/icons/icon.icns "$APP_PATH/Contents/Resources/"
          # Bundle cwebp binary into Resources/ so resolve_tools can find it
          cp "$(which cwebp)" "$APP_PATH/Contents/Resources/"
          chmod +x "$APP_PATH/Contents/Resources/cwebp"
          codesign --force --deep -s - "$APP_PATH"
          
          # Place fix-gatekeeper script next to .app in the DMG
          DMG_DIR="$(dirname "$APP_PATH")"
          cp scripts/fix-gatekeeper.command "$DMG_DIR/"
          chmod +x "$DMG_DIR/fix-gatekeeper.command"
          
          UNIVERSAL_DMG="src-tauri/target/release/bundle/dmg/${APP_NAME}_${VER}_universal.dmg"
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$DMG_DIR" -ov -format UDZO "$UNIVERSAL_DMG"

      - name: Upload ARM64 DMG
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.workspace }}/tauri/src-tauri/target/release/bundle/dmg/${{ env.APP_NAME }}_${{ needs.version.outputs.semver }}_arm64.dmg
          make_latest: false

      - name: Upload Universal DMG
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.workspace }}/tauri/src-tauri/target/release/bundle/dmg/${{ env.APP_NAME }}_${{ needs.version.outputs.semver }}_universal.dmg
          make_latest: true
