name: Build Pic2WebP
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install npm dependencies
        run: npm install
      - name: Build Tauri app (MSI)
        run: npm run tauri build -- --bundles msi
      - name: Upload MSI to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: tauri/src-tauri/target/release/bundle/msi/*.msi
          make_latest: false

  build-macos:
    runs-on: macos-latest  # ARM64
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install cwebp
        run: brew install webp

      - name: Install npm dependencies
        run: npm install

      - name: Build ARM64 binary (Tauri)
        run: npm run tauri build -- --bundles dmg

      - name: Rename ARM64 DMG
        run: |
          # Tauri v2: .app is in macos/, DMG is in dmg/
          if ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null; then
            mv src-tauri/target/release/bundle/dmg/*.dmg src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_arm64.dmg
          else
            echo "No DMG found (may be sign-only build)"
          fi

      - name: Build Intel binary
        working-directory: tauri/src-tauri
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary and DMG
        run: |
          set -e  # stop on any error
          APP_NAME="Pic2WebP"
          
          # Locate the .app bundle (Tauri v2 puts it in macos/ subdirectory)
          APP_PATH=$(find src-tauri/target/release/bundle -name "$APP_NAME.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app bundle not found!"
            find src-tauri/target/release/bundle -type d -maxdepth 3
            exit 1
          fi
          
          # Verify binary exists in .app
          ls -la "$APP_PATH/Contents/MacOS/"
          
          # Create universal binary inside the .app
          lipo -create \
            -output "$APP_PATH/Contents/MacOS/pic2webp" \
            "src-tauri/target/release/pic2webp" \
            "src-tauri/target/x86_64-apple-darwin/release/pic2webp"
          
          # Verify it's a universal binary
          lipo -info "$APP_PATH/Contents/MacOS/pic2webp"
          
          # Re-pack the DMG with universal binary
          UNIVERSAL_DMG="src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_universal.dmg"
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$UNIVERSAL_DMG"

      - name: Upload ARM64 DMG
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.workspace }}/tauri/src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_arm64.dmg
          make_latest: false

      - name: Upload Universal DMG
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.workspace }}/tauri/src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_universal.dmg
          make_latest: true
