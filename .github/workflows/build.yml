name: Build Pic2WebP
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (MSI)
        run: npm run tauri build -- --bundles msi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Pic2WebP-Windows
          path: tauri/src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install cwebp
        run: brew install webp

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (DMG)
        run: npm run tauri build -- --bundles dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Pic2WebP-macOS
          path: tauri/src-tauri/target/release/bundle/dmg/*.dmg
