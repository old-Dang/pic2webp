name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

# 同一分支/tag 的新推送会取消旧的构建
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      # ──────────────────────────────────────────────
      #  macOS: 构建 + ad-hoc 签名
      # ──────────────────────────────────────────────
      - name: Build & Sign (macOS)
        if: matrix.platform == 'macos-latest'
        run: bash scripts/build-and-sign.sh

      - name: Prepare release artifact (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'macos-latest'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp /tmp/pic2webp-signed.dmg "Pic2WebP_${VERSION}_aarch64.dmg"

      # ──────────────────────────────────────────────
      #  Windows: 构建
      # ──────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build

      # ──────────────────────────────────────────────
      #  测试构建产物上传 (main 分支)
      # ──────────────────────────────────────────────
      - name: Upload artifact (macOS)
        if: github.ref == 'refs/heads/main' && matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Pic2WebP-macos-aarch64
          path: /tmp/pic2webp-signed.dmg
          if-no-files-found: error

      - name: Upload artifact (Windows)
        if: github.ref == 'refs/heads/main' && matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Pic2WebP-windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # ──────────────────────────────────────────────
      #  GitHub Release (tag 推送时)
      # ──────────────────────────────────────────────
      - name: Release (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: Pic2WebP_*.dmg
          generate_release_notes: true

      - name: Release (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
