name: Build Pic2WebP
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install npm dependencies
        run: npm install
      - name: Build Tauri app (MSI)
        run: npm run tauri build -- --bundles msi
      - name: Upload MSI to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: tauri/src-tauri/target/release/bundle/msi/*.msi
          make_latest: false

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install cwebp
        run: brew install webp

      - name: Install npm dependencies
        run: npm install

      # ── Non-universal ARM64-only DMG ──
      - name: Build ARM64 DMG via Tauri
        run: npm run tauri build -- --bundles dmg

      - name: Rename ARM64 DMG
        run: |
          arm64_dmg="src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_arm64.dmg"
          if [ -f "$arm64_dmg" ]; then echo "Already renamed from earlier"; else
            mv src-tauri/target/release/bundle/dmg/*.dmg "$arm64_dmg"
          fi

      # ── Universal DMG (ARM64 + x86_64) ──
      - name: Build frontend
        run: npm run build

      - name: Build Intel binary
        working-directory: tauri/src-tauri
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal .app bundle and DMG
        run: |
          set -e
          APP_NAME="Pic2WebP"
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          APP_PATH="$BUNDLE_DIR/$APP_NAME.app"
          
          # ARM64 binary (from first tauri build or fresh cargo build)
          ARM64_BIN="src-tauri/target/release/pic2webp"
          X86_BIN="src-tauri/target/x86_64-apple-darwin/release/pic2webp"
          
          echo "ARM64 binary: $(file $ARM64_BIN | head -c 100)"
          echo "x86_64 binary: $(file $X86_BIN | head -c 100)"
          
          # lipo → universal binary
          UNIVERSAL_BIN="src-tauri/target/release/pic2webp-universal"
          lipo -create -output "$UNIVERSAL_BIN" "$ARM64_BIN" "$X86_BIN"
          echo "Universal binary: $(lipo -info $UNIVERSAL_BIN)"
          
          # Create .app bundle from scratch (Tauri v2 deletes it after building)
          mkdir -p "$APP_PATH/Contents/MacOS"
          mkdir -p "$APP_PATH/Contents/Resources"
          
          # Info.plist
          cat > "$APP_PATH/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundleDisplayName</key>
              <string>$APP_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>com.danglei.pic2webp</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleExecutable</key>
              <string>pic2webp</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Copy universal binary
          cp "$UNIVERSAL_BIN" "$APP_PATH/Contents/MacOS/pic2webp"
          chmod +x "$APP_PATH/Contents/MacOS/pic2webp"
          
          # Copy icon
          cp src-tauri/icons/icon.icns "$APP_PATH/Contents/Resources/"
          
          # Create universal DMG
          UNIVERSAL_DMG="src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_universal.dmg"
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$UNIVERSAL_DMG"
          
          echo "Universal DMG created: $(ls -lh $UNIVERSAL_DMG | awk '{print $5}')"

      - name: Upload ARM64 DMG
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.workspace }}/tauri/src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_arm64.dmg
          make_latest: false

      - name: Upload Universal DMG
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.workspace }}/tauri/src-tauri/target/release/bundle/dmg/Pic2WebP_1.0.0_universal.dmg
          make_latest: true
